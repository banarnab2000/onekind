<!-- HERO -->
<section class="contact-hero">
  <div class="hero-content">
    <div class="hero-eyebrow">REACH OUT</div>
    <h1 class="hero-title">
      CONTACT <span class="red-text">US</span>
      <span class="red-underline"></span>
    </h1>
    <p class="hero-subtitle">Ready to create something extraordinary? Let's talk.</p>
  </div>
</section>

<!-- CONTACT CARDS -->
<section class="contact-cards-section">
  <div class="container">
    <div class="cards-grid">

      <!-- INSTAGRAM -->
      <a
        id="contact-instagram"
        class="contact-card instagram-card"
        href="https://www.instagram.com/onekind.show?igsh=MW4xbXB1czBuY3duYQ%3D%3D"
        target="_blank"
        rel="noopener noreferrer"
      >
        <div class="card-icon instagram-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="url(#ig-grad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <defs>
              <linearGradient id="ig-grad" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#f09433"/>
                <stop offset="25%" stop-color="#e6683c"/>
                <stop offset="50%" stop-color="#dc2743"/>
                <stop offset="75%" stop-color="#cc2366"/>
                <stop offset="100%" stop-color="#bc1888"/>
              </linearGradient>
            </defs>
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </div>
        <div class="card-label">INSTAGRAM</div>
        <div class="card-value">&#64;onekind.show</div>
        <div class="card-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"/>
            <polyline points="7 7 17 7 17 17"/>
          </svg>
        </div>
      </a>

      <!-- EMAIL -->
      <div id="contact-email" class="contact-card email-card">
        <div class="card-icon email-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#e01020" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <div class="card-label">EMAIL US</div>
        <div class="card-value">reach&#64;onekindarts.world</div>
        <div class="card-value secondary">reach.1kind&#64;gmail.com</div>
      </div>

      <!-- PHONE -->
      <div id="contact-phone" class="contact-card phone-card">
        <div class="card-icon phone-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.58 3.4 2 2 0 0 1 3.57 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </div>
        <div class="card-label">CALL US</div>
        <div class="card-value">+91 80725 33539</div>
        <div class="card-value secondary">+91 90032 08746</div>
      </div>

    </div>
  </div>
</section>

<!-- FOOTER STRIP -->
<section class="contact-footer-strip">
  <div class="container">
    <p class="footer-quote">"One kind of experience. Extraordinary results."</p>
  </div>
</section>
