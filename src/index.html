<!doctype html>
<html lang="en">
<head>
  <base href="/">
  <meta charset="utf-8">
  <title>ONEKIND – Live Entertainment Platform</title>
  <meta name="description" content="ONEKIND is a visionary live entertainment platform that curates original shows and launches breakthrough artists.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:title" content="ONEKIND – Live Entertainment Platform">
  <meta property="og:description" content="Immersive experiences combining new-age technology with creative storytelling.">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;900&family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;z-index:9999;padding:20px;font-family:sans-serif;white-space:pre-wrap;';
      d.innerHTML = '<h2>JS Error:</h2><p>' + message + '</p><p>' + (error && error.stack ? error.stack : '') + '</p>';
      document.body.appendChild(d);
    };
    window.addEventListener('unhandledrejection', function(event) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;z-index:9999;padding:20px;font-family:sans-serif;white-space:pre-wrap;';
      d.innerHTML = '<h2>Promise Rejection:</h2><p>' + event.reason + '</p><p>' + (event.reason && event.reason.stack ? event.reason.stack : '') + '</p>';
      document.body.appendChild(d);
    });
  </script>
  <app-root></app-root>
</body>
</html>
